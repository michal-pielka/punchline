[package]
name = "punchline-client"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
chacha20poly1305 = "0.10.1"
clap = { version = "4.6.0", features = ["derive"] }
dirs = "6.0.0"
ed25519-dalek = "2.2.0"
hex = "0.4.3"
hkdf = "0.12.4"
punchline-proto = { path = "../proto" }
rand_core = { version = "0.6", features = ["getrandom"] }
